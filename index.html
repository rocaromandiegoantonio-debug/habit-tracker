<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HABITO ZERO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f17;
    color: #9ca3af;
    padding: 10px;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}
h1 { color:#6ee7b7; font-size:18px; }
h2 { color:#6ee7b7; font-size:12px; }

/* CONTROLES */
.controls { text-align:center; margin:10px 0; }

button {
    background:#1f2937;
    color:#9ca3af;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}

input {
    background:#111827;
    border:none;
    color:white;
    padding:5px;
    border-radius:6px;
}

/* DASHBOARD */
.dashboard {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:10px;
}

.card {
    background:#111827;
    border-radius:10px;
    padding:10px;
}

/* TABLA */
table {
    width:100%;
    border-collapse:separate;
    border-spacing:4px;
    font-size:10px;
}

td {
    width:14px;
    height:14px;
    text-align:center;
    border-radius:3px;
    cursor:pointer;
}

.done {
    background:#10b981;
    color:black;
}

.not-done { background:#1f2937; }

td:first-child {
    width:90px;
    text-align:left;
    color:#6ee7b7;
}

/* MINI DASHBOARD */
.dayBox {
    padding:5px;
    border-radius:6px;
    min-width:70px;
    text-align:center;
    font-size:10px;
}

canvas { max-height:180px; }
</style>
</head>

<body>

<div class="header">
    <h1>📊 HABIT TRACKER</h1>
    <h2>HÁBITO ZERO</h2>
</div>

<div class="controls">
    <button onclick="prevMonth()">⬅</button>
    <span id="monthLabel"></span>
    <button onclick="nextMonth()">➡</button>
    <br><br>
    <input id="newHabit" placeholder="Nuevo hábito">
    <button onclick="addHabit()">➕</button>
</div>

<div class="dashboard">
    <div class="card"><canvas id="lineChart"></canvas></div>
    <div class="card"><canvas id="pieChart"></canvas></div>

    <div class="card" style="grid-column: span 2;">
        <table>
            <thead>
                <tr id="daysRow"><th>Hábito</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- STATS -->
<div class="card" style="margin-top:10px; display:flex; justify-content:space-around;">
    <div>✅ <span id="doneCount">0</span></div>
    <div>❌ <span id="failCount">0</span></div>
    <div>📊 <span id="percentToday">0%</span></div>
</div>

<!-- DISCIPLINA -->
<div class="card" style="margin-top:10px; display:flex; justify-content:space-around;">
    <div>🔥 <span id="streak">0</span></div>
    <div>🎖 <span id="level">Novato</span></div>
    <div>⚠ <span id="status">Normal</span></div>
</div>

<!-- MINI ANALISIS -->
<div class="card" style="margin-top:10px;">
    <div id="dailySummary" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
</div>

<script>
// CONFIG
let currentDate=new Date();
let habits=JSON.parse(localStorage.getItem("habitsList"))||["Gym","Leer","Agua"];

// STORAGE
function getKey(){ return currentDate.getFullYear()+"-"+(currentDate.getMonth()+1); }
function getData(){ return JSON.parse(localStorage.getItem(getKey()))||{}; }
function saveData(data){ localStorage.setItem(getKey(),JSON.stringify(data)); }

// DIAS
function getDaysInMonth(){
    return new Date(currentDate.getFullYear(),currentDate.getMonth()+1,0).getDate();
}

// UI
function updateMonthLabel(){
    const m=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    document.getElementById("monthLabel").textContent=
        m[currentDate.getMonth()]+" "+currentDate.getFullYear();
}

function generateDays(){
    let row=document.getElementById("daysRow");
    row.innerHTML="<th>Hábito</th>";
    let days=getDaysInMonth();

    for(let i=1;i<=days;i++){
        let th=document.createElement("th");
        th.textContent=i;
        row.appendChild(th);
    }
}

// TABLA
function createTable(){
    let body=document.getElementById("tableBody");
    body.innerHTML="";
    let data=getData();
    let days=getDaysInMonth();

    habits.forEach((habit,i)=>{
        let tr=document.createElement("tr");

        let name=document.createElement("td");
        name.textContent=habit;
        tr.appendChild(name);

        for(let d=1;d<=days;d++){
            let td=document.createElement("td");
            let status=data[i]?.[d]?"done":"not-done";
            td.className=status;

            if(status==="done") td.textContent="✔";

            td.onclick=()=>{
                td.classList.toggle("done");
                td.classList.toggle("not-done");

                td.textContent=td.classList.contains("done")?"✔":"";

                if(!data[i]) data[i]={};
                data[i][d]=td.classList.contains("done");

                saveData(data);
                updateAll();
            };

            tr.appendChild(td);
        }

        body.appendChild(tr);
    });
}

// ADD
function addHabit(){
    let input=document.getElementById("newHabit");
    if(!input.value.trim()) return;

    habits.push(input.value);
    localStorage.setItem("habitsList",JSON.stringify(habits));
    input.value="";
    createTable();
}

// GRAFICAS
let lineChart=new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{labels:[],datasets:[{data:[],borderColor:"#6ee7b7"}]},
    options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}
});

let pieChart=new Chart(document.getElementById("pieChart"),{
    type:"doughnut",
    data:{datasets:[{data:[0,100],backgroundColor:["#10b981","#1f2937"]}]}
});

// STATS HOY
function updateDailyStats(){
    let data=getData();
    let today=new Date().getDate();

    let done=0;
    habits.forEach((_,i)=>{ if(data[i]?.[today]) done++; });

    let total=habits.length;
    let fail=total-done;
    let percent= total?Math.round((done/total)*100):0;

    document.getElementById("doneCount").textContent=done;
    document.getElementById("failCount").textContent=fail;
    document.getElementById("percentToday").textContent=percent+"%";
}

// DISCIPLINA
function updateDiscipline(){
    let today=new Date().getDate();
    let data=getData();

    let doneToday=0;
    habits.forEach((_,i)=>{ if(data[i]?.[today]) doneToday++; });

    let percent= habits.length?(doneToday/habits.length)*100:0;

    let streak=0;
    for(let d=today;d>=1;d--){
        let full=true;
        for(let i=0;i<habits.length;i++){
            if(!data[i]?.[d]){ full=false; break; }
        }
        if(full) streak++; else break;
    }

    document.getElementById("streak").textContent=streak;

    let level="Novato";
    if(streak>=3) level="Constante";
    if(streak>=7) level="Disciplinado";
    if(streak>=15) level="Imparable";
    if(streak>=30) level="MONSTRUO";

    document.getElementById("level").textContent=level;

    let status="Normal";
    if(percent===100) status="🔥 Perfecto";
    else if(percent>=70) status="🟡 Bien";
    else if(percent>0) status="⚠ Flojo";
    else status="💀 Fallaste";

    document.getElementById("status").textContent=status;
}

// ANALISIS POR DIA
function updateDailySummary(){
    let container=document.getElementById("dailySummary");
    container.innerHTML="";

    let data=getData();
    let days=getDaysInMonth();

    for(let d=1;d<=days;d++){
        let done=0;

        habits.forEach((_,i)=>{
            if(data[i]?.[d]) done++;
        });

        let total=habits.length;
        let fail=total-done;
        let percent= total?Math.round((done/total)*100):0;

        let color="#1f2937";
        if(percent>=80) color="#065f46";
        else if(percent>=50) color="#92400e";
        else if(percent>0) color="#7f1d1d";

        let box=document.createElement("div");
        box.className="dayBox";
        box.style.background=color;

        box.innerHTML=`
            <div>D${d}</div>
            <div>✅${done}</div>
            <div>❌${fail}</div>
            <div>${percent}%</div>
        `;

        container.appendChild(box);
    }
}

// GRAFICAS
function updateCharts(){
    let data=getData();
    let days=getDaysInMonth();

    let daily=Array(days).fill(0);
    let total=habits.length*days;
    let done=0;

    habits.forEach((_,i)=>{
        for(let d=1;d<=days;d++){
            if(data[i]?.[d]){
                done++;
                daily[d-1]++;
            }
        }
    });

    let percentages=daily.map(v=> habits.length?(v/habits.length)*100:0);

    lineChart.data.labels=Array.from({length:days},(_,i)=>i+1);
    lineChart.data.datasets[0].data=percentages;
    lineChart.update();

    let percentTotal= total?(done/total)*100:0;
    pieChart.data.datasets[0].data=[percentTotal,100-percentTotal];
    pieChart.update();
}

// TODO
function updateAll(){
    updateCharts();
    updateDailyStats();
    updateDiscipline();
    updateDailySummary();
}

// NAV
function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); render(); }
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); render(); }

// RENDER
function render(){
    updateMonthLabel();
    generateDays();
    createTable();
    updateAll();
}

render();
</script>

</body>
</html>
