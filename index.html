<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Habit Tracker GOD</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f17;
    color: #9ca3af;
    padding: 10px;
}

/* TITULO */
h1 {
    text-align: center;
    color: #6ee7b7;
    font-size: 20px;
    letter-spacing: 1px;
}

/* CONTROLES */
.controls {
    text-align: center;
    margin-bottom: 10px;
}

button {
    background: #1f2937;
    color: #9ca3af;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
}

input {
    background: #111827;
    border: none;
    color: white;
    padding: 5px;
    border-radius: 6px;
}

/* DASHBOARD */
.dashboard {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
}

.card {
    background: #111827;
    border-radius: 10px;
    padding: 10px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 4px;
    font-size: 10px;
}

td {
    width: 14px;
    height: 14px;
    text-align: center;
    vertical-align: middle;
    border-radius: 3px;
    cursor: pointer;
}

/* ESTADOS */
.done {
    background: #10b981;
    color: black;
    font-size: 10px;
}

.not-done {
    background: #1f2937;
}

/* HÁBITO */
td:first-child {
    width: 90px;
    text-align: left;
    color: #6ee7b7;
}

/* GRAFICAS */
canvas {
    max-height: 180px;
}
</style>
</head>

<body>

<h1>📊 HABIT TRACKER</h1>

<div class="controls">
    <button onclick="prevMonth()">⬅</button>
    <span id="monthLabel"></span>
    <button onclick="nextMonth()">➡</button>
    <br><br>
    <input id="newHabit" placeholder="Nuevo hábito">
    <button onclick="addHabit()">➕</button>
</div>

<div class="dashboard">
    <div class="card"><canvas id="lineChart"></canvas></div>
    <div class="card"><canvas id="pieChart"></canvas></div>

    <div class="card" style="grid-column: span 2;">
        <table>
            <thead>
                <tr id="daysRow"><th>Hábito</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
// CONFIG
let currentDate = new Date();
let habits = JSON.parse(localStorage.getItem("habitsList")) || ["Gym","Leer","Agua"];

// CLAVE POR MES
function getKey() {
    return currentDate.getFullYear()+"-"+(currentDate.getMonth()+1);
}

function getData() {
    return JSON.parse(localStorage.getItem(getKey())) || {};
}

function saveData(data) {
    localStorage.setItem(getKey(), JSON.stringify(data));
}

// DIAS DEL MES
function getDaysInMonth() {
    return new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();
}

// UI MES
function updateMonthLabel() {
    const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    document.getElementById("monthLabel").textContent =
        meses[currentDate.getMonth()]+" "+currentDate.getFullYear();
}

// DIAS
function generateDays() {
    const row = document.getElementById("daysRow");
    row.innerHTML = "<th>Hábito</th>";

    let days = getDaysInMonth();
    for (let i=1;i<=days;i++){
        let th=document.createElement("th");
        th.textContent=i;
        row.appendChild(th);
    }
}

// TABLA
function createTable() {
    const body = document.getElementById("tableBody");
    body.innerHTML="";
    let data=getData();
    let days=getDaysInMonth();

    habits.forEach((habit,i)=>{
        let tr=document.createElement("tr");

        let name=document.createElement("td");
        name.textContent=habit;
        tr.appendChild(name);

        for(let d=1;d<=days;d++){
            let td=document.createElement("td");
            let status=data[i]?.[d]?"done":"not-done";
            td.className=status;

            if(status==="done") td.textContent="✔";

            td.onclick=()=>{
                td.classList.toggle("done");
                td.classList.toggle("not-done");

                if(td.classList.contains("done")){
                    td.textContent="✔";
                }else{
                    td.textContent="";
                }

                if(!data[i]) data[i]={};
                data[i][d]=td.classList.contains("done");

                saveData(data);
                updateCharts();
            };

            tr.appendChild(td);
        }

        body.appendChild(tr);
    });
}

// AÑADIR
function addHabit(){
    let input=document.getElementById("newHabit");
    if(!input.value.trim()) return;

    habits.push(input.value);
    localStorage.setItem("habitsList",JSON.stringify(habits));

    input.value="";
    createTable();
}

// CAMBIAR MES
function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); render(); }
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); render(); }

// GRAFICAS
let lineChart=new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{labels:[],datasets:[{data:[],borderColor:"#6ee7b7"}]},
    options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}
});

let pieChart=new Chart(document.getElementById("pieChart"),{
    type:"doughnut",
    data:{datasets:[{data:[0,100],backgroundColor:["#10b981","#1f2937"]}]},
    options:{plugins:{legend:{display:false}}}
});

// UPDATE GRAFICAS
function updateCharts(){
    let data=getData();
    let days=getDaysInMonth();

    let daily=Array(days).fill(0);
    let total=habits.length*days;
    let done=0;

    habits.forEach((_,i)=>{
        for(let d=1;d<=days;d++){
            if(data[i]?.[d]){
                done++;
                daily[d-1]++;
            }
        }
    });

    let percentages=daily.map(v=> habits.length ? (v/habits.length)*100 : 0);

    lineChart.data.labels=Array.from({length:days},(_,i)=>i+1);
    lineChart.data.datasets[0].data=percentages;
    lineChart.update();

    let percentTotal= total ? (done/total)*100 : 0;

    pieChart.data.datasets[0].data=[percentTotal,100-percentTotal];
    pieChart.update();
}

// RENDER
function render(){
    updateMonthLabel();
    generateDays();
    createTable();
    updateCharts();
}

render();
</script>

</body>
</html>
