<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Habit Tracker PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #020617;
    color: #e2e8f0;
    padding: 10px;
}

h1 {
    text-align: center;
    color: #38bdf8;
    font-size: 20px;
}

/* INPUT */
.top-controls {
    text-align: center;
    margin-bottom: 10px;
}

input {
    padding: 6px;
    border-radius: 6px;
    border: none;
    background: #0f172a;
    color: white;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    background: #38bdf8;
    cursor: pointer;
}

/* DASHBOARD */
.dashboard {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
}

.card {
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 8px;
}

canvas {
    max-height: 180px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
}

/* CUADRITOS PEQUEÑOS */
td {
    width: 12px;
    height: 12px;
    cursor: pointer;
}

/* COLORES */
.done {
    background: #22c55e;
}

.not-done {
    background: #0f172a;
}

td:first-child {
    width: 80px;
    text-align: left;
    color: #38bdf8;
}

/* GRID PIXEL */
td:not(:first-child) {
    border: 1px solid #020617;
}
</style>
</head>

<body>

<h1>📊 HABIT TRACKER MENSUAL</h1>

<div class="top-controls">
    <input id="newHabit" placeholder="Nuevo hábito">
    <button onclick="addHabit()">➕</button>
</div>

<div class="dashboard">
    <div class="card">
        <canvas id="lineChart"></canvas>
    </div>
    <div class="card">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="card" style="grid-column: span 2;">
        <table id="habitTable">
            <thead>
                <tr>
                    <th>Hábito</th>
                    <!-- 31 días -->
                    ${Array.from({length:31},(_,i)=>`<th>${i+1}</th>`).join("")}
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let habits = JSON.parse(localStorage.getItem("habitsList")) || ["Gym","Leer","Agua"];
let data = JSON.parse(localStorage.getItem("monthData")) || {};

const days = 31;
const tableBody = document.querySelector("#habitTable tbody");

/* CREAR TABLA */
function createTable() {
    tableBody.innerHTML = "";

    habits.forEach((habit, i) => {
        let row = "<tr><td>"+habit+"</td>";

        for (let d = 1; d <= days; d++) {
            let status = data[i]?.[d] ? "done" : "not-done";

            row += `<td class="${status}" onclick="toggle(${i},${d},this)"></td>`;
        }

        row += "</tr>";
        tableBody.innerHTML += row;
    });
}

/* TOGGLE */
function toggle(i, d, cell) {
    cell.classList.toggle("done");
    cell.classList.toggle("not-done");

    if (!data[i]) data[i] = {};
    data[i][d] = cell.classList.contains("done");

    save();
    updateCharts();
}

/* AÑADIR */
function addHabit() {
    const input = document.getElementById("newHabit");
    if (!input.value.trim()) return;

    habits.push(input.value);
    input.value = "";

    save();
    createTable();
}

/* GUARDAR */
function save() {
    localStorage.setItem("habitsList", JSON.stringify(habits));
    localStorage.setItem("monthData", JSON.stringify(data));
}

/* GRÁFICOS */
let lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
        labels: Array.from({length:31},(_,i)=>i+1),
        datasets: [{
            data: Array(31).fill(0),
            borderColor: '#38bdf8'
        }]
    },
    options: {plugins:{legend:{display:false}}}
});

let pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
        datasets: [{
            data: [0,100],
            backgroundColor: ['#22c55e','#ef4444']
        }]
    }
});

/* UPDATE */
function updateCharts() {
    let total = habits.length * days;
    let done = 0;
    let daily = Array(days).fill(0);

    Object.entries(data).forEach(([i,row])=>{
        Object.entries(row).forEach(([d,val])=>{
            if(val){
                done++;
                daily[d-1]++;
            }
        });
    });

    lineChart.data.datasets[0].data = daily;
    lineChart.update();

    pieChart.data.datasets[0].data = [done,total-done];
    pieChart.update();
}

/* INIT */
createTable();
updateCharts();
</script>

</body>
</html>
