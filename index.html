<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Habit Tracker PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #020617;
    color: #e2e8f0;
    margin: 0;
    padding: 15px;
}

/* TITULO */
h1 {
    text-align: center;
    color: #38bdf8;
    margin-bottom: 10px;
}

/* INPUT */
.top-controls {
    text-align: center;
    margin-bottom: 15px;
}

input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #0f172a;
    color: white;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #38bdf8;
    color: black;
    cursor: pointer;
    margin-left: 5px;
}

/* DASHBOARD */
.dashboard {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 15px;
}

/* GRAFICOS */
.card {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 10px;
}

canvas {
    max-height: 220px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

th {
    background: #020617;
    color: #94a3b8;
}

td {
    height: 20px;
    cursor: pointer;
}

/* PIXEL STYLE */
.done {
    background: #22c55e;
}

.not-done {
    background: #0f172a;
}

/* GRID LOOK */
tbody tr td:not(:first-child) {
    border: 1px solid #0f172a;
}

tbody tr td:first-child {
    text-align: left;
    padding-left: 5px;
    color: #38bdf8;
}
</style>
</head>

<body>

<h1>📊 HABIT TRACKER</h1>

<div class="top-controls">
    <input id="newHabit" placeholder="Nuevo hábito...">
    <button onclick="addHabit()">➕</button>
    <button onclick="resetData()">Reset</button>
</div>

<div class="dashboard">

    <div class="card">
        <canvas id="lineChart"></canvas>
    </div>

    <div class="card">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="card" style="grid-column: span 2;">
        <table id="habitTable">
            <thead>
                <tr>
                    <th>Hábito</th>
                    <th>L</th><th>M</th><th>X</th><th>J</th><th>V</th><th>S</th><th>D</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
let habits = JSON.parse(localStorage.getItem("habitsList")) || ["Gym","Leer","Agua","Estudiar"];
let savedData = JSON.parse(localStorage.getItem("habitsData")) || [];

const days = 7;
const tableBody = document.querySelector("#habitTable tbody");

/* CREAR TABLA */
function createTable() {
    tableBody.innerHTML = "";

    habits.forEach((habit, i) => {
        let row = "<tr><td>" + habit + "</td>";

        for (let j = 0; j < days; j++) {
            let status = savedData[i]?.[j] ? "done" : "not-done";

            row += `<td class="${status}" onclick="toggle(this, ${i}, ${j})"></td>`;
        }

        row += "</tr>";
        tableBody.innerHTML += row;
    });
}

/* TOGGLE */
function toggle(cell, i, j) {
    cell.classList.toggle("done");
    cell.classList.toggle("not-done");

    if (!savedData[i]) savedData[i] = [];
    savedData[i][j] = cell.classList.contains("done");

    saveAll();
    updateCharts();
}

/* AÑADIR HABITO */
function addHabit() {
    const input = document.getElementById("newHabit");
    const value = input.value.trim();

    if (!value) return;

    habits.push(value);
    savedData.push([]);

    input.value = "";

    saveAll();
    createTable();
    updateCharts();
}

/* GUARDAR */
function saveAll() {
    localStorage.setItem("habitsData", JSON.stringify(savedData));
    localStorage.setItem("habitsList", JSON.stringify(habits));
}

/* RESET */
function resetData() {
    localStorage.clear();
    habits = ["Gym","Leer","Agua","Estudiar"];
    savedData = [];
    createTable();
    updateCharts();
}

/* GRÁFICOS */
let lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
        labels: ["L","M","X","J","V","S","D"],
        datasets: [{
            data: [0,0,0,0,0,0,0],
            borderColor: '#38bdf8',
            tension: 0.4
        }]
    },
    options: {
        plugins: {legend: {display: false}},
        scales: {y: {display:false}, x:{color:'#94a3b8'}}
    }
});

let pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
        datasets: [{
            data: [0,100],
            backgroundColor: ['#22c55e','#ef4444']
        }]
    },
    options: {
        plugins: {legend: {display: false}}
    }
});

/* ACTUALIZAR */
function updateCharts() {
    let total = habits.length * days;
    let completed = 0;
    let daily = Array(7).fill(0);

    savedData.forEach((row, i) => {
        row?.forEach((val, j) => {
            if (val) {
                completed++;
                daily[j]++;
            }
        });
    });

    lineChart.data.datasets[0].data = daily;
    lineChart.update();

    pieChart.data.datasets[0].data = [completed, total - completed];
    pieChart.update();
}

/* INIT */
createTable();
updateCharts();
</script>

</body>
</html>
